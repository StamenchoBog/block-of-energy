---
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    
  # Terraform Infrastructure
  - package-ecosystem: terraform
    directory: "/infra"
    schedule:
      interval: "weekly"

  # App API (Node.js/pnpm)
  - package-ecosystem: "npm"
    directory: "/app/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    versioning-strategy: increase
    commit-message:
      prefix: "deps(api)"
      include: "scope"
    assignees:
      - "stamencho.bogdanovski"

  # App Frontend (Node.js/pnpm)
  - package-ecosystem: "npm"
    directory: "/app/frontend"
    schedule:
      interval: "weekly"
      day: "monday" 
      time: "09:00"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    versioning-strategy: increase
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    assignees:
      - "stamencho.bogdanovski"

  # Continuous Temper Auditor Function (Node.js/npm)
  - package-ecosystem: "npm"
    directory: "/infra/functions/continuous_temper_auditor"
